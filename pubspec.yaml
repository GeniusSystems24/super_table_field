name: super_table_field
description: >
  Super Table Field — a GeniusLink design-system Flutter package providing the
  unified SuperTable data grid for ERP / accounting screens: readable/editable
  modes, a typed column hierarchy, change tracking (add/modify/delete deltas),
  per-column + advanced filtering, custom aggregations, selection statistics,
  conditional styling, grouping, totals, pagination, CSV/TSV/JSON export, row
  reordering, per-cell edit locking, clipboard and undo/redo — wired to the
  AutoSuggestionsBox typeahead from the companion super_auto_suggestion_box
  package. Light/dark + LTR/RTL.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core:
    path: ../super_core
  super_auto_suggestion_box:
    path: ../super_auto_suggestion_box

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
  # Drop brand .ttf files under assets/fonts/ to match the design system exactly.
  # Families: Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
