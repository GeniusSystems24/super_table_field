name: super_table_field
description: >
  A GeniusLink design-system Flutter data grid for ERP and accounting screens.
  SuperTable includes readable and editable modes, typed columns, filtering,
  grouping, totals, pagination, export, change tracking, undo/redo, row
  reordering, and AutoSuggestionsBox-powered combo cells.
version: 1.1.0
homepage: https://geniussystems24.github.io/super_table_field
repository: https://github.com/GeniusSystems24/super_table_field
issue_tracker: https://github.com/GeniusSystems24/super_table_field/issues

topics:
  - flutter
  - widgets
  - data-grid
  - tables
  - forms

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core: ^0.1.0
  super_auto_suggestion_box: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
  # Drop brand .ttf files under assets/fonts/ to match the design system exactly.
  # Families: Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
