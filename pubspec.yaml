name: super_table_field
description: >
  Super Table Field — a GeniusLink Flutter design-system package for ERP and
  accounting data grids. Includes read/edit modes, typed columns, change
  tracking, filtering, aggregations, selection stats, conditional styling,
  grouping, totals, pagination, CSV/TSV/JSON export, row reordering, cell
  locking, interaction events, runtime column config (reorder/pin/show-hide),
  clipboard, undo/redo, and AutoSuggestionsBox integration. Supports
  light/dark themes and LTR/RTL.


version: 2.2.0

homepage: https://geniussystems24.github.io/super_table_field
repository: https://github.com/GeniusSystems24/super_table_field
issue_tracker: https://github.com/GeniusSystems24/super_table_field/issues

topics:
  - flutter
  - widgets
  - data-grid
  - tables
  - forms
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  # Shared GeniusLink design-system foundation (theme, tokens, type, widgets).
  super_core: ^0.1.0
  super_auto_suggestion_box: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo-mark.png
    - assets/logo-mark-white.png
